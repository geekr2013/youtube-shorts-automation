name: Daily Original Knowledge Short

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/daily-upload.yml'
      - 'requirements.txt'
      - 'src/**'
      - 'tests/**'
  schedule:
    # 매일 한국 시간 19:35 (UTC 10:35)
    - cron: '35 10 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '영상만 만들고 YouTube에는 올리지 않기'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-original-knowledge-short
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
      RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      YOUTUBE_PRIVACY: public

    steps:
      - name: 저장소 준비
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 영상 도구 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-nanum
          sudo fc-cache -f

      - name: Python 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 자동 검사
        run: |
          python -m compileall -q src
          python -m unittest discover -s tests -v

      - name: 영상 생성만 테스트
        id: dry_run
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == true) }}
        run: python src/main.py --dry-run

      - name: 영상 생성 및 공개 업로드
        id: upload
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != true) }}
        run: python src/main.py

      - name: 실행 상태 작성
        if: always()
        env:
          RUN_EVENT: ${{ github.event_name }}
          DRY_RUN_REQUESTED: ${{ inputs.dry_run }}
          DRY_RUN_OUTCOME: ${{ steps.dry_run.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
          RUN_ID: ${{ github.run_id }}
          RUN_SHA: ${{ github.sha }}
        run: python src/run_status.py

      - name: 운영 기록 저장
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "Original Shorts Bot"
          git add data/published_topics.json data/automation_status.json
          git diff --cached --quiet || git commit -m "Update Shorts performance data [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: 확인용 결과 보관
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-preview-${{ github.run_id }}
          path: |
            data/work/metadata.json
            data/work/render/final_short.mp4
          if-no-files-found: ignore
          retention-days: 3

